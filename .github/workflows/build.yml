name: Flutter 一键构建 (Android + Windows)

# 触发条件：推送/手动触发都可以
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 支持在 Actions 页面手动点击运行

jobs:
  build-android:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # 可改成你的项目版本
          channel: 'stable'
          cache: true

      - name: 配置国内镜像（解决下载慢）
        run: |
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> $GITHUB_ENV
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> $GITHUB_ENV

      - name: 清理 + 拉取依赖
        run: |
          flutter clean
          flutter pub get

      - name: 构建 Android Release APK
        run: flutter build apk --release

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    name: 构建 Windows EXE
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 配置国内镜像
        run: |
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> $env:GITHUB_ENV
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> $env:GITHUB_ENV

      - name: 清理 + 拉取依赖
        run: |
          flutter clean
          flutter pub get

      - name: 构建 Windows Release EXE
        run: flutter build windows --release

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: build/windows/x64/runner/Release/
          retention-days: 30

