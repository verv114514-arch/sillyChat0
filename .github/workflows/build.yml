name: Flutter 一键构建 (Android APK + Windows EXE)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.4'  # 更新为符合 SDK ^3.5.4 的版本
          channel: 'stable'

      - name: 安装依赖
        run: flutter pub get

      - name: 清理项目
        run: flutter clean

      - name: 构建 Android APK (Release)
        run: flutter build apk --release

      - name: 上传 APK 制品
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    name: 构建 Windows EXE
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.4'  # 更新为符合 SDK ^3.5.4 的版本
          channel: 'stable'

      - name: 启用 Windows 桌面支持
        run: flutter config --enable-windows-desktop

      - name: 安装依赖
        run: flutter pub get

      - name: 清理项目
        run: flutter clean

      - name: 构建 Windows EXE (Release)
        run: flutter build windows --release

      - name: 上传 Windows 构建制品
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/x64/runner/Release/
          retention-days: 30

  create-release:
    name: 创建发布
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: 下载 Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: 下载 Windows 应用
        uses: actions/download-artifact@v4
        with:
          name: windows-app

      - name: 压缩 Windows 应用
        run: zip -r windows-app.zip windows-app/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            app-release.apk
            windows-app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
