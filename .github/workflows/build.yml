name: Flutter Build (Android APK + Windows EXE)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  FLUTTER_VERSION: '3.19.0'  # 请根据你的项目修改 Flutter 版本
  OUTPUT_DIR: build_output

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Clean project
        run: flutter clean

      - name: Build Android APK (Release)
        run: flutter build apk --release

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Clean project
        run: flutter clean

      - name: Build Windows EXE (Release)
        run: flutter build windows --release

      - name: Create output directory
        run: |
          if (Test-Path $env:OUTPUT_DIR) { Remove-Item -Recurse -Force $env:OUTPUT_DIR }
          New-Item -ItemType Directory -Force -Path $env:OUTPUT_DIR

      - name: Copy Windows build artifacts
        run: |
          Copy-Item -Recurse -Force "build\windows\x64\runner\Release\*" "$env:OUTPUT_DIR\Windows_App\"

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ env.OUTPUT_DIR }}/Windows_App
          retention-days: 30

  build-and-package-all:
    name: Package All Builds
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ${{ env.OUTPUT_DIR }}

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ${{ env.OUTPUT_DIR }}/Windows_App

      - name: Create combined archive
        run: |
          cd ${{ env.OUTPUT_DIR }}
          zip -r ../flutter-builds.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Build ${{ github.run_number }}
          tag_name: build-${{ github.run_number }}
          body: |
            ## 🔨 自动构建产物
            
            **构建编号:** ${{ github.run_number }}
            **分支:** ${{ github.ref_name }}
            **提交:** ${{ github.sha }}
            
            ### 📦 包含文件:
            - Android APK (Release)
            - Windows EXE (Release)
            
          files: flutter-builds.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
