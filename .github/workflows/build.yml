name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Remove invalid java.home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      - name: Accept Android SDK licenses
        run: |
          yes | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        continue-on-error: true

      - name: Install NDK 29.0.13113456
        run: |
          sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (optional)
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build APK (android-arm64)
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: silly-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk
