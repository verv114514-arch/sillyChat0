name: Flutter 一键构建 (Android APK + Windows EXE)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: 修复依赖冲突
        run: |
          # 在 pubspec.yaml 中添加 dependency_overrides
          cat >> pubspec.yaml << 'EOF'
          
          # Auto-generated by CI to resolve dependency conflicts
          dependency_overrides:
            path: ^1.9.1
          EOF

      - name: 显示修改后的 pubspec.yaml
        run: cat pubspec.yaml

      - name: 安装依赖
        run: flutter pub get

      - name: 清理项目
        run: flutter clean

      - name: 构建 Android APK (Release)
        run: flutter build apk --release

      - name: 上传 APK 制品
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    name: 构建 Windows EXE
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: 启用 Windows 桌面支持
        run: flutter config --enable-windows-desktop

      - name: 修复依赖冲突 (PowerShell)
        shell: pwsh
        run: |
          # 在 pubspec.yaml 中添加 dependency_overrides
          Add-Content -Path pubspec.yaml -Value @'
          
          # Auto-generated by CI to resolve dependency conflicts
          dependency_overrides:
            path: ^1.9.1
          '@

      - name: 安装依赖
        run: flutter pub get

      - name: 清理项目
        run: flutter clean

      - name: 构建 Windows EXE (Release)
        run: flutter build windows --release

      - name: 上传 Windows 构建制品
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/x64/runner/Release/
          retention-days: 30
